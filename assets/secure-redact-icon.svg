<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#0d0e0c"/>

  <!-- Document/paper background -->
  <rect x="96" y="64" width="320" height="384" rx="12" fill="#f5f5f5" opacity="0.95"/>

  <!-- Redaction bars (main visual element) -->
  <!-- Top redacted line -->
  <rect x="128" y="128" width="180" height="24" rx="4" fill="#0d0e0c"/>

  <!-- Second redacted line (shorter) -->
  <rect x="128" y="176" width="140" height="24" rx="4" fill="#0d0e0c"/>

  <!-- Third redacted line -->
  <rect x="128" y="224" width="200" height="24" rx="4" fill="#0d0e0c"/>

  <!-- Normal text lines (represented as light gray bars) -->
  <rect x="128" y="288" width="240" height="12" rx="2" fill="#c0c0c0"/>
  <rect x="128" y="312" width="200" height="12" rx="2" fill="#c0c0c0"/>
  <rect x="128" y="336" width="260" height="12" rx="2" fill="#c0c0c0"/>

  <!-- Shield/security element overlaid -->
  <g transform="translate(360, 80)">
    <!-- Shield shape -->
    <path d="M0,0 Q0,-8 8,-8 L32,-8 Q40,-8 40,0 L40,32 Q40,48 24,56 Q8,48 8,32 L8,0 Z" fill="#0d0e0c"/>
    <!-- Lock symbol inside shield -->
    <rect x="16" y="16" width="8" height="12" rx="1" fill="#f5f5f5"/>
    <circle cx="20" cy="12" r="4" fill="none" stroke="#f5f5f5" stroke-width="2"/>
  </g>
</svg>