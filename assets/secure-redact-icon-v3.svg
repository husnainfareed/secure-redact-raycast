<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#0d0e0c"/>

  <!-- Central redaction symbol - like a marker/highlighter stroke -->
  <!-- Main redaction bar (thick, prominent) -->
  <rect x="80" y="200" width="352" height="48" rx="24" fill="#f5f5f5"/>

  <!-- Secondary redaction bar (smaller, offset) -->
  <rect x="120" y="280" width="272" height="32" rx="16" fill="#f5f5f5" opacity="0.7"/>

  <!-- Third redaction bar (smallest) -->
  <rect x="160" y="340" width="192" height="24" rx="12" fill="#f5f5f5" opacity="0.5"/>

  <!-- Small security indicator -->
  <g transform="translate(440, 160)">
    <!-- Minimalist shield -->
    <path d="M0,8 Q0,0 8,0 L16,0 Q24,0 24,8 L24,20 Q24,28 12,32 Q0,28 0,20 Z" fill="#f5f5f5"/>
    <!-- Lock dot -->
    <circle cx="12" cy="16" r="2" fill="#0d0e0c"/>
  </g>
</svg>