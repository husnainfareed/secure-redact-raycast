<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#0d0e0c"/>

  <!-- Main content area (representing a document/screen) -->
  <rect x="80" y="80" width="352" height="352" rx="16" fill="#f5f5f5"/>

  <!-- Large redaction bars (the main focal point) -->
  <!-- These represent sensitive data being hidden -->

  <!-- Top redaction block -->
  <rect x="120" y="140" width="240" height="32" rx="6" fill="#0d0e0c"/>

  <!-- Middle redaction block (slightly shorter) -->
  <rect x="120" y="200" width="200" height="32" rx="6" fill="#0d0e0c"/>

  <!-- Bottom redaction block -->
  <rect x="120" y="260" width="220" height="32" rx="6" fill="#0d0e0c"/>

  <!-- Subtle visible text lines (what remains unredacted) -->
  <rect x="120" y="340" width="180" height="8" rx="2" fill="#888888" opacity="0.6"/>
  <rect x="120" y="360" width="150" height="8" rx="2" fill="#888888" opacity="0.6"/>

  <!-- Security/lock indicator in corner -->
  <g transform="translate(360, 120)">
    <!-- Simple lock icon -->
    <rect x="0" y="12" width="24" height="20" rx="3" fill="#0d0e0c"/>
    <circle cx="12" cy="8" r="6" fill="none" stroke="#0d0e0c" stroke-width="3"/>
    <!-- Lock highlight -->
    <circle cx="12" cy="22" r="2" fill="#f5f5f5"/>
  </g>
</svg>